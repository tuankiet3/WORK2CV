name: Work2CV CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify CI environment
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL repository secret is required for the production Next.js build."
            exit 1
          fi

      - name: Run ESLint
        run: npm run lint

      - name: Run Build
        run: npm run build
